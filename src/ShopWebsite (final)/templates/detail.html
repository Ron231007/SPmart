<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ product.name }}</title>
  <style>
        body {
                    font-family: Arial, sans-serif;
                    margin: 0;               /* remove default body margin */
                    padding: 0;              /* remove body padding */
                    background: linear-gradient(135deg, #a8edea, #fed6e3, #ffe6f0);            
                    display: flex;
                    justify-content: center; /* horizontal center */
                    align-items: center;     /* vertical center */
                    height: 100vh;       /* full viewport height */
                    width: 100%;
                    box-sizing: border-box;
                }   
                
       .card {
            width: 45%;
            padding: 30px;
            box-sizing: border-box;
            box-shadow: 0 6px 20px rgba(50, 50, 50, 0.1);
            border: 2px solid rgba(50, 50, 50, 0.15);
        }    input[type=number]{width:80px;padding:6px;border:1px solid #ddd;border-radius:6px}
        button {padding: 10px 0;
                    border-radius: 6px;
                    border: none;
                    cursor: pointer;
                    font-size: 1rem;
                    width: 34%;
                    transition: transform 0.2s ease;
                    background-color: #ffffff; 
                    border: 2px solid #7e57c2; 
                    color: #7e57c2;
                    margin-right: 0;
                    margin-top: 12px;
        }

            button:hover{
                        background-color: #7e57c2;
                        border: 2px solid #ffffff; 
                        color: #ffffff;
                        transform: scale(1.05);

                      }
  </style>
</head>
<body>
  <div class="card">
    <p><a href="{{ url_for('index') }}">&larr; Back to products</a></p>
    <h1>{{ product.name }}</h1>
    <img src="{{ url_for('static', filename='img/' + product.name.lower() + '.jpg') }}" width="200" alt="{{ product.name }}">
    <p>Price: ${{ '%.2f'|format(product.price) }}</p>
    <p>In stock: {{ product.quantity }}</p>

    <!-- Quantity form: posts to same route (product/<id>) -->
    <form method="post" action="{{ url_for('detail', prod_id=product.id) }}">
      <label for="qty">Quantity</label>
      <input id="qty" name="qty" type="number" min="1" value="1" max="{{ product.quantity }}">
      <button type="submit">Add to Cart</button>
    </form>

    <p style="margin-top:12px"><a href="{{ url_for('cart') }}">Go to cart</a></p>
  </div>
</body>
</html>
